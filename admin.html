<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>教員管理・テスト作成ダッシュボード</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f8f9fa;color:#333;}
.tab-container{display:flex;margin-bottom:20px;border-bottom:2px solid #ccc;}
.tab{padding:10px 20px;cursor:pointer;background:#e0e0e0;border-radius:5px 5px 0 0;margin-right:5px;font-weight:bold;}
.tab.active{background:#1a73e8;color:white;}
.panel{background:white;padding:25px;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.1);display:none;}
.panel.active{display:block;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
th{background:#f1f3f4;}
.editor-sec{border:1px solid #dadce0;padding:20px;margin-bottom:20px;border-radius:8px;background:#fdfdfd;}
.editor-q{background:#f1f3f4;padding:15px;margin:15px 0;border-radius:6px;position:relative;}
input[type="text"], select{width:100%;padding:8px;margin:5px 0;box-sizing:border-box;}
.btn{padding:8px 16px;font-size:14px;cursor:pointer;font-weight:bold;border:none;border-radius:4px;margin:5px;}
.btn-blue{background:#1a73e8;color:white;}
.btn-green{background:#137333;color:white;}
.btn-red{background:#d93025;color:white;}
</style>
</head>
<body>

<h2>教員用総合統括ダッシュボード</h2>

<div id="login-zone" style="text-align:center; padding:5px;">
  <input id="pass" type="password" placeholder="管理者パスワード" style="width:250px; padding:10px;">
  <button class="btn btn-blue" onclick="checkLogin()" style="padding:10px 20px;">ログイン</button>
</div>

<div id="main-zone" style="display:none;">
  <div class="tab-container">
    <div id="tab1" class="tab active" onclick="switchTab(1)">① 受験者成績・ステータス確認</div>
    <div id="tab2" class="tab" onclick="switchTab(2)">② テスト構成・作成（Googleフォーム風）</div>
  </div>

  <div id="panel1" class="panel active">
    <button class="btn btn-blue" onclick="loadScores()">最新データに更新</button>
    <button class="btn btn-green" onclick="downloadCSV()">CSVダウンロード</button>
    <div id="table-area" style="margin-top:15px;">※データを読み込んでいます...</div>
  </div>

  <div id="panel2" class="panel">
    <h3>試験プロパティ設定</h3>
    <label><b>試験名（タイトル）:</b></label>
    <input type="text" id="edit-exam-name" value="">
    <label><b>制限時間（秒）:</b></label>
    <input type="number" id="edit-time-limit" value="1800" style="padding:8px; width:100px; margin:5px 0;"><br><br>

    <div id="sections-builder"></div>

    <button class="btn btn-blue" onclick="addSectionStructure()">＋ 新しいセクションを追加</button>
    <hr style="margin:30px 0;">
    <div style="text-align:center;">
      <button class="btn btn-green" onclick="generateConfigJSON()" style="font-size:18px; padding:12px 35px;">config.json として設定を出力・保存</button>
    </div>
  </div>
</div>

<script>
const PASSWORD = "admin ishikariminami 2026";
let csvData = "";
let currentEditorData = { settings: { examName: "", timeLimit: 1800, autoSubmit: true }, sections: [] };

function checkLogin(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("login-zone").style.display = "none";
    document.getElementById("main-zone").style.display = "block";
    loadScores();
    loadCurrentConfig();
  } else {
    alert("パスワードが違います。");
  }
}

function switchTab(num) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + num).classList.add('active');
  document.getElementById('panel' + num).classList.add('active');
}

// GASから受験ログを取得
async function loadScores(){
  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbx_7hO1brtwsA7MZIxq7pj3YeDWrTySisWcWyeV-my0SDwFaxvi-Cd2uS_RpUm4UdQ_/exec");
    csvData = await res.text();
    const rows = csvData.trim().split("\n");
    let html = `<table><tr><th>氏名</th><th>学籍番号</th><th>獲得点数</th><th>離脱回数</th><th>離脱時間(秒)</th><th>不正警告</th><th>管理番号</th></tr>`;
    for(let i=1; i<rows.length; i++){
      let r = rows[i].split(",");
      if(r.length < 4) continue;
      html += `<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]} 点</td><td>${r[3]} 回</td><td>${r[4]} 秒</td><td>${r[5]}</td><td><code>${r[6]||'-'}</code></td></tr>`;
    }
    document.getElementById("table-area").innerHTML = html + `</table>`;
  } catch(e) {
    document.getElementById("table-area").innerHTML = "データの取得に失敗しました。GASのWebアプリURLを確認してください。";
  }
}

function downloadCSV(){
  const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvData], {type: "text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "exam_results.csv";
  a.click();
}

// 既存のconfig.jsonをエディタに読み込む
async function loadCurrentConfig() {
  try {
    const res = await fetch("config.json");
    currentEditorData = await res.json();
  } catch(e) {
    // 存在しない場合は空のデフォルト
    currentEditorData = { settings: { examName: "新規定期試験", timeLimit: 1800, autoSubmit: true }, sections: [] };
  }
  document.getElementById("edit-exam-name").value = currentEditorData.settings.examName;
  document.getElementById("edit-time-limit").value = currentEditorData.settings.timeLimit;
  renderBuilder();
}

function renderBuilder() {
  let html = "";
  currentEditorData.sections.forEach((sec, sIdx) => {
    html += `
      <div class="editor-sec">
        <div style="display:flex; justify-content:between; align-items:center;">
          <h4 style="margin:0; color:#1a73e8; flex:1;">■ セクション ${sIdx + 1}</h4>
          <button class="btn btn-red" onclick="removeSection(${sIdx})">このセクションを削除</button>
        </div>
        <input type="text" placeholder="セクションのタイトル (例: 第1章 基礎知識)" value="${sec.title}" onchange="currentEditorData.sections[${sIdx}].title=this.value">
        
        <div id="questions-zone-${sIdx}">`;
        
    sec.questions.forEach((q, qIdx) => {
      html += `
        <div class="editor-q">
          <div style="text-align:right;"><button class="btn btn-red" style="padding:2px 8px; font-size:11px;" onclick="removeQuestion(${sIdx}, ${qIdx})">問題を削除</button></div>
          <label>問題文:</label>
          <input type="text" value="${q.q}" onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].q=this.value">
          
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
            <div><label>選択肢1:</label><input type="text" value="${q.choices[0]||''}" onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].choices[0]=this.value"></div>
            <div><label>選択肢2:</label><input type="text" value="${q.choices[1]||''}" onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].choices[1]=this.value"></div>
            <div><label>選択肢3:</label><input type="text" value="${q.choices[2]||''}" onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].choices[2]=this.value"></div>
            <div><label>選択肢4:</label><input type="text" value="${q.choices[3]||''}" onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].choices[3]=this.value"></div>
          </div>
          
          <label style="margin-top:10px; display:block;"><b>正解となる番号:</b></label>
          <select onchange="currentEditorData.sections[${sIdx}].questions[${qIdx}].ans=Number(this.value)">
            <option value="1" ${q.ans===1?'selected':''}>選択肢1が正解</option>
            <option value="2" ${q.ans===2?'selected':''}>選択肢2が正解</option>
            <option value="3" ${q.ans===3?'selected':''}>選択肢3が正解</option>
            <option value="4" ${q.ans===4?'selected':''}>選択肢4が正解</option>
          </select>
        </div>`;
    });
    
    html += `
        </div>
        <button class="btn btn-blue" style="background:#5f6368;" onclick="addQuestionToSection(${sIdx})">＋ このセクションに問題を追加</button>
      </div>`;
  });
  document.getElementById("sections-builder").innerHTML = html;
}

function addSectionStructure() {
  currentEditorData.sections.push({ title: "新しいセクション", questions: [] });
  renderBuilder();
}

function removeSection(sIdx) {
  if(confirm("このセクション内の問題もすべて削除されます。よしいですか？")) {
    currentEditorData.sections.splice(sIdx, 1);
    renderBuilder();
  }
}

function addQuestionToSection(sIdx) {
  const qId = "q_" + Date.now() + "_" + Math.floor(Math.random()*1000);
  currentEditorData.sections[sIdx].questions.push({
    id: qId,
    q: "新しい問題文",
    choices: ["選択肢A", "選択肢B", "選択肢C", "選択肢D"],
    ans: 1
  });
  renderBuilder();
}

function removeQuestion(sIdx, qIdx) {
  currentEditorData.sections[sIdx].questions.splice(qIdx, 1);
  renderBuilder();
}

function generateConfigJSON() {
  currentEditorData.settings.examName = document.getElementById("edit-exam-name").value;
  currentEditorData.settings.timeLimit = Number(document.getElementById("edit-time-limit").value);

  const jsonString = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentEditorData, null, 2));
  const dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", jsonString);
  dlAnchor.setAttribute("download", "config.json");
  dlAnchor.click();
}
</script>
</body>
</html>
