<h1>成績管理</h1>

<table border="1" id="tbl"></table>

<script>

const data = JSON.parse(localStorage.getItem("last_result"));

if(!data){
  document.getElementById("tbl").innerHTML =
    "<tr><td>データがありません</td></tr>";
}else{
  document.getElementById("tbl").innerHTML =
  `
  <tr><th>名前</th><th>点数</th><th>不正</th></tr>
  <tr>
    <td>${data.name}</td>
    <td>${data.score}</td>
    <td>${data.risk}</td>
  </tr>
  `;
}

</script>
