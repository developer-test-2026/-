<h1>成績一覧</h1>

<table border="1" id="tbl"></table>

<script>

async function load(){

  const res = await fetch("data.json");
  const data = await res.json();

  document.getElementById("tbl").innerHTML=
  `<tr><th>名前</th><th>点数</th><th>不正</th></tr>`+
  data.map(d=>
    `<tr>
      <td>${d.name}</td>
      <td>${d.score}</td>
      <td>${d.risk}</td>
    </tr>`
  ).join("");
}

load();

</script>
