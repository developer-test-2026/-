<h1>管理画面</h1>

<table border="1" id="tbl"></table>

<script>

async function load(){

  const res=await fetch("YOUR_SHEET_JSON_OR_EXPORT");
  const data=await res.json();

  document.getElementById("tbl").innerHTML=
  `<tr>
    <th>名前</th><th>学籍番号</th><th>点数</th><th>不正</th>
  </tr>`+
  data.map(d=>
    `<tr>
      <td>${d.name}</td>
      <td>${d.studentId}</td>
      <td>${d.score}</td>
      <td>${d.risk}</td>
    </tr>`
  ).join("");
}

load();

</script>
