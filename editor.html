<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト作成・設定エディタ</title>
<style>
  body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 25px; color: #333; }
  .wrapper { max-width: 950px; margin: 0 auto; }
  .exam-header { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 8px solid #2196f3; }
  .section-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #10b981; }
  .q-card { background: #f8fafc; border: 1px solid #cbd5e1; padding: 20px; border-radius: 6px; margin-top: 15px; margin-bottom: 15px; }
  h1, h2 { margin-top: 0; color: #1e293b; }
  input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
  .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: inline-block; margin-right: 5px; }
  .btn-primary { background: #2196f3; color: white; }
  .btn-success { background: #10b981; color: white; }
  .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 13px; }
  .btn-outline { background: transparent; border: 1px solid #2196f3; color: #2196f3; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .choice-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="exam-header">
    <h1>試験の基本設定</h1>
    <label>テストタイトル</label>
    <input type="text" id="cfg-name" value="2026年度 情報・プログラミング 定期考査" style="font-size: 18px; font-weight: bold;">
    <label>テストの説明・注意事項</label>
    <textarea id="cfg-desc" rows="3">最後まで諦めずに解答してください。</textarea>
    
    <div class="grid-2">
      <div><label>ユニーク試験ID</label><input type="text" id="cfg-id" value="EXAM-2026-NEW"></div>
      <div><label>制限時間（総秒数）</label><input type="number" id="cfg-limit" value="1800"></div>
    </div>
  </div>

  <div id="sections-container"></div>

  <div style="text-align: center; margin: 30px 0;">
    <button class="btn btn-primary" style="padding: 15px 30px; font-size: 16px;" onclick="addSection()">+ 新しいセクションを追加</button>
    <br><br><hr><br>
    <button class="btn btn-success" style="font-size: 18px; padding: 15px 40px;" onclick="buildAndDownloadJSON()">💾 config.json を生成して保存</button>
  </div>
</div>

<script>
let sections = [];

function addSection() {
  sections.push({
    id: "sec_" + Date.now(),
    title: "無題のセクション",
    description: "",
    questions: []
  });
  renderEditor();
}

function addQuestion(secIdx) {
  sections[secIdx].questions.push({
    id: "q_" + Date.now(),
    type: "single",
    text: "新しい問題",
    options: ["選択肢1", "選択肢2", "選択肢3"],
    answer: [0],
    score: 10
  });
  renderEditor();
}

function removeSection(secIdx) {
  if(confirm("このセクションと中の問題をすべて削除しますか？")) {
    sections.splice(secIdx, 1);
    renderEditor();
  }
}

function removeQuestion(secIdx, qIdx) {
  sections[secIdx].questions.splice(qIdx, 1);
  renderEditor();
}

function renderEditor() {
  const container = document.getElementById('sections-container');
  container.innerHTML = "";

  sections.forEach((sec, sIdx) => {
    let qHTML = "";
    sec.questions.forEach((q, qIdx) => {
      let optHTML = "";
      if (q.type === 'single' || q.type === 'multiple') {
        q.options.forEach((opt, oIdx) => {
          const isChecked = q.answer.includes(oIdx) ? "checked" : "";
          const inputType = q.type === 'single' ? 'radio' : 'checkbox';
          optHTML += `
            <div class="choice-row">
              <input type="${inputType}" name="ans_${sIdx}_${qIdx}" ${isChecked} onchange="setAnswer(${sIdx}, ${qIdx}, ${oIdx}, this.checked)">
              <input type="text" value="${opt}" onchange="sections[${sIdx}].questions[${qIdx}].options[${oIdx}]=this.value" style="flex:1; margin:0;">
              <button class="btn btn-danger" onclick="removeOption(${sIdx}, ${qIdx}, ${oIdx})">削除</button>
            </div>`;
        });
        optHTML += `<button class="btn btn-outline" style="padding:5px 10px; font-size:12px; margin-top:5px;" onclick="addOption(${sIdx}, ${qIdx})">+ 選択肢追加</button>`;
      } else if (q.type === 'text') {
        optHTML += `<textarea placeholder="模範解答" onchange="sections[${sIdx}].questions[${qIdx}].answer=[this.value]">${q.answer[0] || ''}</textarea>`;
      }

      qHTML += `
        <div class="q-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <select onchange="changeQType(${sIdx}, ${qIdx}, this.value)" style="width:auto; margin:0;">
              <option value="single" ${q.type==='single'?'selected':''}>単一選択</option>
              <option value="multiple" ${q.type==='multiple'?'selected':''}>複数選択</option>
              <option value="text" ${q.type==='text'?'selected':''}>記述式</option>
            </select>
            <div>
              配点: <input type="number" value="${q.score}" onchange="sections[${sIdx}].questions[${qIdx}].score=parseInt(this.value)" style="width:60px; margin:0; display:inline-block;"> 点
              <button class="btn btn-danger" onclick="removeQuestion(${sIdx}, ${qIdx})" style="margin-left:10px;">問題を削除</button>
            </div>
          </div>
          <textarea placeholder="問題文" onchange="sections[${sIdx}].questions[${qIdx}].text=this.value" rows="2">${q.text}</textarea>
          <div style="margin-top:10px;">${optHTML}</div>
        </div>`;
    });

    container.innerHTML += `
      <div class="section-card">
        <div style="display:flex; justify-content:space-between;">
          <h2 style="margin-bottom:0;">セクション ${sIdx + 1}</h2>
          <button class="btn btn-danger" onclick="removeSection(${sIdx})">セクション削除</button>
        </div>
        <input type="text" value="${sec.title}" onchange="sections[${sIdx}].title=this.value" placeholder="セクションタイトル" style="font-size:16px; font-weight:bold;">
        <textarea placeholder="セクションの説明（任意）" onchange="sections[${sIdx}].description=this.value" rows="2">${sec.description}</textarea>
        ${qHTML}
        <button class="btn btn-outline" style="margin-top:15px;" onclick="addQuestion(${sIdx})">+ このセクションに問題を追加</button>
      </div>`;
  });
}

function changeQType(sIdx, qIdx, type) {
  const q = sections[sIdx].questions[qIdx];
  q.type = type;
  if(type === 'text') { q.options = []; q.answer = [""]; }
  else { q.options = ["選択肢1", "選択肢2"]; q.answer = [0]; }
  renderEditor();
}

function addOption(sIdx, qIdx) {
  sections[sIdx].questions[qIdx].options.push("新規選択肢");
  renderEditor();
}

function removeOption(sIdx, qIdx, oIdx) {
  sections[sIdx].questions[qIdx].options.splice(oIdx, 1);
  sections[sIdx].questions[qIdx].answer = [0];
  renderEditor();
}

function setAnswer(sIdx, qIdx, oIdx, isChecked) {
  const q = sections[sIdx].questions[qIdx];
  if(q.type === 'single') { q.answer = [oIdx]; } 
  else {
    if(isChecked && !q.answer.includes(oIdx)) q.answer.push(oIdx);
    else if(!isChecked) q.answer = q.answer.filter(v => v !== oIdx);
  }
}

function buildAndDownloadJSON() {
  const output = {
    settings: {
      examId: document.getElementById('cfg-id').value,
      examName: document.getElementById('cfg-name').value,
      description: document.getElementById('cfg-desc').value,
      timeLimit: parseInt(document.getElementById('cfg-limit').value)
    },
    sections: sections
  };
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(output, null, 2));
  const dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", dataStr);
  dlAnchor.setAttribute("download", "config.json");
  dlAnchor.click();
}

window.onload = () => { if(sections.length === 0) addSection(); };
</script>
</body>
</html>
