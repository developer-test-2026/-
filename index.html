<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試験システム</title>
<style>
body{margin:0;font-family:sans-serif;}
.header{background:#ffebee;color:#c62828;text-align:center;padding:10px;font-weight:bold;}
#login{max-width:500px;margin:40px auto;text-align:center;}
input{width:90%;padding:10px;margin:5px;font-size:16px;}
button{padding:10px 20px;font-size:16px;cursor:pointer;}
#app{display:none;padding:20px;}
#counter{position:fixed;top:10px;right:10px;background:white;border:1px solid #ccc;padding:10px;font-size:14px;}
</style>
</head>
<body>
<div class="header">試験中は他の操作をしないでください</div>
<div id="counter">
  残り時間: <span id="timerDisplay">--</span><br>
  離脱: <span id="leaveCount">0</span> | 不正: <span id="violation">0</span>
</div>
<div id="login">
  <h2>受験者情報</h2>
  <input id="name" placeholder="氏名">
  <input id="sid" placeholder="学籍番号"><br>
  <button onclick="start()">開始</button>
</div>
<div id="app"></div>

<script>
let questions=[], current=0, score=0, active=false, leaveCount=0, leaveTime=0, leaveStart=null, violation=0, timerInterval;
// config.jsonの代わりとしてここに設定値を定義
const CONFIG = { timeLimit: 1800, autoSubmit: true }; 
let timeLeft = CONFIG.timeLimit;

let token = localStorage.getItem("exam_token") || crypto.randomUUID();
localStorage.setItem("exam_token", token);

async function load(){
  const res = await fetch("questions.csv");
  const text = await res.text();
  questions = text.trim().split("\n").slice(1).map(l=>{
    let c = l.split(",");
    return {q:c[0], choices:c.slice(1,5), ans:Number(c[5])}
  });
}

function start(){
  active=true;
  document.documentElement.requestFullscreen();
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  
  if(CONFIG.autoSubmit){
    timerInterval = setInterval(()=>{
      timeLeft--;
      document.getElementById("timerDisplay").innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2,'0');
      if(timeLeft <= 0) finish();
    }, 1000);
  }
  render();
}

function render(){
  let q=questions[current];
  document.getElementById("app").innerHTML=`<h3>${q.q}</h3>` + q.choices.map((c,i)=>`<label><input type="radio" name="q" value="${i+1}"> ${c}</label><br>`).join("") + `<br><button onclick="next()">次へ</button>`;
}

function next(){
  let sel=document.querySelector("input[name=q]:checked");
  if(!sel) return;
  if(+sel.value === questions[current].ans) score++;
  current++;
  if(current>=questions.length) finish();
  else render();
}

async function finish(){
  active=false;
  clearInterval(timerInterval);
  await fetch("https://script.google.com/macros/s/AKfycbx_7hO1brtwsA7MZIxq7pj3YeDWrTySisWcWyeV-my0SDwFaxvi-Cd2uS_RpUm4UdQ_/exec", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:document.getElementById("name").value, studentId:document.getElementById("sid").value, score:score, leaveCount:leaveCount, leaveTime:leaveTime, violation:violation})
  });
  document.body.innerHTML=`<h1>終了</h1><p>スコア: ${score}/${questions.length}</p>`;
}

document.addEventListener("visibilitychange",()=>{
  if(!active) return;
  if(document.hidden){ leaveStart=Date.now(); violation++; }
  else{ leaveCount++; leaveTime+=Math.round((Date.now()-leaveStart)/1000); }
  document.getElementById("leaveCount").innerText=leaveCount;
  document.getElementById("violation").innerText=violation;
});
window.onload=load;
</script>
</body>
</html>
